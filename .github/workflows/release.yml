name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Build backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist/api-monitor/web
          go build \
            -ldflags "-s -w -X api-monitor/internal/version.Version=${VERSION} -X api-monitor/internal/version.Commit=${GITHUB_SHA} -X api-monitor/internal/version.Date=${DATE}" \
            -o dist/api-monitor/api-monitor ./cmd/api-monitor
          cp -R migrations dist/api-monitor/migrations
          cp -R web/dist dist/api-monitor/web/dist
          cp README.md LICENSE .env.example docker-compose.yml docker-compose.release.yml dist/api-monitor/
          cp -R docs dist/api-monitor/docs
          tar -C dist -czf "api-monitor_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" api-monitor
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-monitor_${{ matrix.goos }}_${{ matrix.goarch }}
          path: api-monitor_*.tar.gz

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build metadata
        id: build-meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.build-meta.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.build-meta.outputs.date }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build-binaries, docker]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: api-monitor_*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: api-monitor_*.tar.gz
          generate_release_notes: true
