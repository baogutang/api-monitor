name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Build backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist/api-monitor/web
          go build \
            -ldflags "-s -w -X api-monitor/internal/version.Version=${VERSION} -X api-monitor/internal/version.Commit=${GITHUB_SHA} -X api-monitor/internal/version.Date=${DATE}" \
            -o dist/api-monitor/api-monitor ./cmd/api-monitor
          cp -R migrations dist/api-monitor/migrations
          cp -R web/dist dist/api-monitor/web/dist
          cp README.md LICENSE .env.example docker-compose.yml docker-compose.release.yml dist/api-monitor/
          cp -R docs dist/api-monitor/docs
          tar -C dist -czf "api-monitor_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" api-monitor
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-monitor_${{ matrix.goos }}_${{ matrix.goarch }}
          path: api-monitor_*.tar.gz

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build metadata
        id: build-meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.build-meta.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.build-meta.outputs.date }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build-binaries, docker]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: api-monitor_*
          merge-multiple: true
      - name: Write deployment-first release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > release_body.md <<EOF
          # API Monitor ${VERSION}

          This release publishes ready-to-run API Monitor binaries and a multi-arch Docker image.

          ## Docker image

          \`\`\`bash
          ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_REF_NAME}
          ghcr.io/${GITHUB_REPOSITORY}:latest
          \`\`\`

          Supported Docker platforms:

          - linux/amd64
          - linux/arm64

          ## Docker Compose deployment

          \`\`\`bash
          mkdir -p api-monitor
          cd api-monitor
          curl -fsSLO https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/docker-compose.release.yml

          cat > .env <<'ENVEOF'
          HTTP_PORT=5090
          API_MONITOR_IMAGE=ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_REF_NAME}
          POSTGRES_PASSWORD=replace-with-a-strong-password
          APP_SECRET=replace-with-at-least-32-random-characters
          DEFAULT_SCAN_INTERVAL_SECONDS=60
          GITHUB_REPO=${GITHUB_REPOSITORY}
          ENABLE_SELF_UPDATE=false
          ENVEOF

          docker compose -f docker-compose.release.yml up -d
          \`\`\`

          Open:

          \`\`\`text
          http://<server-ip>:5090
          \`\`\`

          ## Upgrade an existing Docker deployment

          \`\`\`bash
          cd api-monitor
          sed -i.bak 's#^API_MONITOR_IMAGE=.*#API_MONITOR_IMAGE=ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_REF_NAME}#' .env
          docker compose -f docker-compose.release.yml pull api worker
          docker compose -f docker-compose.release.yml up -d
          docker compose -f docker-compose.release.yml ps
          \`\`\`

          The API service runs database migrations automatically on startup. Keep the same APP_SECRET value across upgrades; changing it invalidates encrypted upstream credentials.

          ## Binary artifacts

          Download the matching tarball below:

          - api-monitor_${VERSION}_linux_amd64.tar.gz
          - api-monitor_${VERSION}_linux_arm64.tar.gz
          - api-monitor_${VERSION}_darwin_amd64.tar.gz
          - api-monitor_${VERSION}_darwin_arm64.tar.gz

          Each archive includes:

          - api-monitor binary
          - built web assets
          - database migrations
          - docker-compose examples
          - README, docs, and .env.example

          ## Required runtime services

          - PostgreSQL 14+
          - Redis 6+
          - One API service process: \`api-monitor api\`
          - One worker process: \`api-monitor worker\`

          ## Version check and self-update

          API Monitor can check this GitHub Release from the Settings page when \`GITHUB_REPO=${GITHUB_REPOSITORY}\` is configured.

          Self-update is intentionally disabled by default. Enable it only in a trusted deployment environment:

          \`\`\`bash
          ENABLE_SELF_UPDATE=true
          UPDATE_COMMAND='docker compose -f docker-compose.release.yml pull api worker && docker compose -f docker-compose.release.yml up -d'
          \`\`\`

          ## Rollback

          Set \`API_MONITOR_IMAGE\` back to the previous tag and restart:

          \`\`\`bash
          docker compose -f docker-compose.release.yml pull api worker
          docker compose -f docker-compose.release.yml up -d
          \`\`\`

          Always keep database volumes and Redis volumes mounted. Do not delete them during upgrades or rollbacks.
          EOF
      - uses: softprops/action-gh-release@v2
        with:
          files: api-monitor_*.tar.gz
          body_path: release_body.md
