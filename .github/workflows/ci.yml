name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Go tests
        run: go test ./...

      - name: Frontend build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Docker build
        run: |
          docker build \
            --build-arg VERSION=ci \
            --build-arg COMMIT="${GITHUB_SHA}" \
            --build-arg DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t api-monitor:ci .
